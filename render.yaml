services:
  - type: web
    name: volt-frontend
    runtime: static
    buildCommand: >
      cd Frontend &&
      npm install &&
      npm run build &&
      rm -rf render-dist &&
      if [ -d dist/client ]; then
        cp -R dist/client render-dist;
      elif [ -d .output/public ]; then
        cp -R .output/public render-dist;
      else
        cp -R dist render-dist;
      fi
    staticPublishPath: Frontend/render-dist
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html

  - type: web
    name: volt-admin
    runtime: static
    buildCommand: cd admin && npm install && npm run build
    staticPublishPath: admin/dist
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
