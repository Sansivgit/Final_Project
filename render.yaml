services:
  - type: web
    name: volt-frontend
    runtime: static
    buildCommand: >
      cd Frontend &&
      npm install &&
      npm run build
    staticPublishPath: Frontend/dist
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html

  - type: web
    name: volt-admin
    runtime: static
    buildCommand: cd admin && npm install && npm run build
    staticPublishPath: admin/dist
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
